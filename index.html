<!DOCTYPE html>
<html lang="id" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WA Clone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── CSS VARIABLES ─────────────────────────────────── */
    :root {
      --transition: 0.25s ease;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --font-main: 'Plus Jakarta Sans', sans-serif;
      --font-alt: 'Space Grotesk', sans-serif;
    }

    [data-theme="dark"] {
      --bg-root: #0d1117;
      --bg-panel: #161b22;
      --bg-panel2: #1c2128;
      --bg-header: #161b22;
      --bg-input: #21262d;
      --bg-chat-even: #1c2128;
      --bg-chat-odd: #161b22;
      --bg-bubble-sent: #1d6ea6;
      --bg-bubble-recv: #21262d;
      --bg-hover: rgba(45, 120, 180, 0.15);
      --bg-active: rgba(45, 120, 180, 0.25);
      --bg-search: #21262d;
      --accent: #3b9ede;
      --accent2: #58c4f0;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #6e7681;
      --border: rgba(255,255,255,0.06);
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
      --online-dot: #3fb950;
      --divider: rgba(255,255,255,0.04);
      --sent-tail: #1d6ea6;
      --recv-tail: #21262d;
    }

    [data-theme="light"] {
      --bg-root: #f0f4f8;
      --bg-panel: #ffffff;
      --bg-panel2: #f6f8fa;
      --bg-header: #ffffff;
      --bg-input: #f0f4f8;
      --bg-chat-even: #f0f4f8;
      --bg-chat-odd: #ffffff;
      --bg-bubble-sent: #1d6ea6;
      --bg-bubble-recv: #e8edf2;
      --bg-hover: rgba(45, 120, 180, 0.08);
      --bg-active: rgba(45, 120, 180, 0.15);
      --bg-search: #eaeef2;
      --accent: #1d6ea6;
      --accent2: #1558a0;
      --text-primary: #1c2128;
      --text-secondary: #57606a;
      --text-muted: #8c959f;
      --border: rgba(0,0,0,0.07);
      --shadow: 0 8px 32px rgba(0,0,0,0.12);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.07);
      --online-dot: #2da44e;
      --divider: rgba(0,0,0,0.04);
      --sent-tail: #1d6ea6;
      --recv-tail: #e8edf2;
    }

    /* ─── RESET & BASE ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-main);
      background: var(--bg-root);
      color: var(--text-primary);
      height: 100dvh;
      overflow: hidden;
      transition: background var(--transition), color var(--transition);
    }

    /* ─── LAYOUT SHELL ───────────────────────────────────── */
    .app {
      display: flex;
      height: 100dvh;
      width: 100%;
      overflow: hidden;
    }

    /* ─── LEFT SIDEBAR ───────────────────────────────────── */
    .sidebar {
      width: 360px;
      min-width: 280px;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      transition: background var(--transition), transform 0.3s ease;
      flex-shrink: 0;
      z-index: 10;
    }

    /* Sidebar Header */
    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      min-height: 60px;
    }

    .profile-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .profile-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--accent);
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      font-family: var(--font-alt);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition);
      color: var(--text-secondary);
    }

    .icon-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .icon-btn svg { width: 20px; height: 20px; fill: currentColor; }

    /* Theme Toggle */
    .theme-toggle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), transform 0.4s ease;
      color: var(--text-secondary);
    }

    .theme-toggle:hover {
      background: var(--bg-hover);
      color: var(--accent);
      transform: rotate(20deg);
    }

    .theme-toggle svg { width: 20px; height: 20px; }

    /* Search Bar */
    .search-bar {
      padding: 8px 12px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--divider);
    }

    .search-inner {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-search);
      border-radius: 30px;
      padding: 7px 14px;
      transition: background var(--transition);
    }

    .search-inner:focus-within {
      box-shadow: 0 0 0 2px var(--accent);
    }

    .search-inner svg { width: 16px; height: 16px; fill: var(--text-muted); flex-shrink: 0; }

    .search-inner input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 14px;
      color: var(--text-primary);
      font-family: var(--font-main);
    }

    .search-inner input::placeholder { color: var(--text-muted); }

    /* Chat List */
    .chat-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .chat-list::-webkit-scrollbar { width: 4px; }
    .chat-list::-webkit-scrollbar-track { background: transparent; }
    .chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background var(--transition);
      border-bottom: 1px solid var(--divider);
      position: relative;
    }

    .chat-item:hover { background: var(--bg-hover); }
    .chat-item.active { background: var(--bg-active); }
    .chat-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 0 3px 3px 0;
    }

    .chat-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .chat-avatar-placeholder {
      font-size: 18px;
      font-weight: 700;
      color: white;
      font-family: var(--font-alt);
    }

    .chat-info { flex: 1; min-width: 0; }

    .chat-info-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 3px;
    }

    .chat-name {
      font-size: 14.5px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: var(--font-alt);
    }

    .chat-time {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .chat-preview {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .unread-badge {
      background: var(--accent);
      color: white;
      font-size: 11px;
      font-weight: 700;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ─── RIGHT PANEL ────────────────────────────────────── */
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-panel2);
      overflow: hidden;
      position: relative;
    }

    /* Chat Header */
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      min-height: 60px;
      flex-shrink: 0;
    }

    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      display: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: background var(--transition);
    }

    .back-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .back-btn svg { width: 20px; height: 20px; fill: currentColor; }

    .header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .header-avatar-placeholder { font-size: 16px; font-weight: 700; color: white; font-family: var(--font-alt); }

    .header-info { }
    .header-name { font-size: 15px; font-weight: 600; color: var(--text-primary); font-family: var(--font-alt); line-height: 1.2; }
    .header-status { font-size: 12px; color: var(--online-dot); font-weight: 500; }
    .header-status.offline { color: var(--text-muted); }

    .chat-header-right {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Chat Body */
    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
      background: var(--bg-panel2);
    }

    .chat-body::-webkit-scrollbar { width: 4px; }
    .chat-body::-webkit-scrollbar-track { background: transparent; }
    .chat-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Welcome screen */
    .welcome-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text-muted);
      padding: 32px;
      text-align: center;
    }

    .welcome-screen .welcome-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--bg-hover);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }

    .welcome-screen .welcome-icon svg { width: 40px; height: 40px; fill: var(--accent); opacity: 0.6; }
    .welcome-screen h2 { font-size: 22px; font-weight: 600; color: var(--text-secondary); font-family: var(--font-alt); }
    .welcome-screen p { font-size: 14px; color: var(--text-muted); max-width: 280px; line-height: 1.6; }

    /* Date separator */
    .date-separator {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 12px 0 8px;
    }

    .date-separator span {
      background: var(--bg-input);
      color: var(--text-muted);
      font-size: 11.5px;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    /* Message Bubbles */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      animation: msgIn 0.22s ease;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.sent { flex-direction: row-reverse; }

    .msg-mini-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: white;
      align-self: flex-end;
      margin-bottom: 2px;
    }

    .msg-mini-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .bubble {
      max-width: 68%;
      padding: 9px 13px 7px;
      border-radius: 16px;
      position: relative;
      word-break: break-word;
      box-shadow: var(--shadow-sm);
    }

    .msg-row.sent .bubble {
      background: var(--bg-bubble-sent);
      border-bottom-right-radius: 4px;
      color: #fff;
    }

    .msg-row.recv .bubble {
      background: var(--bg-bubble-recv);
      border-bottom-left-radius: 4px;
      color: var(--text-primary);
    }

    .bubble-text { font-size: 14px; line-height: 1.5; }

    .bubble-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      margin-top: 4px;
    }

    .bubble-time { font-size: 10.5px; opacity: 0.65; }
    .msg-row.sent .bubble-time { color: #d4eeff; }
    .msg-row.recv .bubble-time { color: var(--text-muted); }

    .tick-icon { width: 14px; height: 14px; fill: #90caff; }

    /* Chat Input */
    .chat-input-area {
      padding: 10px 16px;
      background: var(--bg-header);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-box {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--bg-input);
      border-radius: 30px;
      padding: 8px 14px;
      gap: 8px;
      transition: box-shadow var(--transition), background var(--transition);
    }

    .input-box:focus-within {
      box-shadow: 0 0 0 2px var(--accent);
    }

    .emoji-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      transition: transform 0.2s;
    }

    .emoji-btn:hover { transform: scale(1.2); }

    .msg-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 14.5px;
      color: var(--text-primary);
      font-family: var(--font-main);
      resize: none;
      height: 24px;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.5;
    }

    .msg-input::placeholder { color: var(--text-muted); }

    .attach-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color var(--transition), transform 0.2s;
    }

    .attach-btn:hover { color: var(--accent); transform: rotate(45deg); }
    .attach-btn svg { width: 20px; height: 20px; fill: currentColor; }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background var(--transition), transform 0.15s;
      box-shadow: 0 2px 8px rgba(29, 110, 166, 0.4);
    }

    .send-btn:hover { background: var(--accent2); transform: scale(1.07); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn svg { width: 20px; height: 20px; fill: white; transform: translateX(1px); }

    /* ─── EMOJI PICKER PANEL ─────────────────────────────── */
    .emoji-picker {
      position: absolute;
      bottom: 72px;
      left: 16px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px;
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      width: 280px;
      box-shadow: var(--shadow);
      z-index: 100;
    }

    .emoji-picker.open { display: flex; animation: fadeUp 0.18s ease; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .emoji-picker span {
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: background 0.15s;
      user-select: none;
    }

    .emoji-picker span:hover { background: var(--bg-hover); }

    /* ─── MOBILE OVERLAY ─────────────────────────────────── */
    .mobile-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 5;
    }

    /* ─── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        width: 100%;
        max-width: 100%;
        transform: translateX(0);
        z-index: 20;
        transition: transform 0.3s ease;
      }

      .sidebar.hidden { transform: translateX(-100%); }

      .main-panel { width: 100%; }

      .back-btn { display: flex !important; }

      .bubble { max-width: 82%; }
    }

    @media (min-width: 769px) {
      .back-btn { display: none !important; }
    }

    /* ─── NOTIFICATION TOAST ─────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-panel);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 13px;
      box-shadow: var(--shadow);
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 999;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─── TYPING INDICATOR ───────────────────────────────── */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }

    .typing-dots {
      background: var(--bg-bubble-recv);
      padding: 10px 14px;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-dots span {
      width: 7px;
      height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-5px); opacity: 1; }
    }
  </style>
</head>

<body>
  <div class="app" id="app">
    <!-- ── SIDEBAR ── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="profile-area">
          <div class="profile-avatar">
            <img src="img/d4712700-7aa7-1f6c-9d61-b97b76f85a5c.jpg" alt="profile"
              onerror="this.parentElement.innerHTML='<span style=\'display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:white;font-weight:700;font-size:16px;font-family:var(--font-alt)\'>I</span>'" />
          </div>
          <span class="profile-name">/Index</span>
        </div>
        <div class="header-actions">
          <button class="theme-toggle" id="themeToggle" title="Toggle tema">
            <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"/>
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
            </svg>
          </button>
          <button class="icon-btn" title="Chat baru">
            <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
          </button>
          <button class="icon-btn" title="Menu">
            <svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
          </button>
        </div>
      </div>

      <div class="search-bar">
        <div class="search-inner">
          <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input type="text" placeholder="Cari atau mulai chat baru" id="searchInput" />
        </div>
      </div>

      <div class="chat-list" id="chatList"></div>
    </aside>

    <!-- ── MAIN PANEL ── -->
    <main class="main-panel" id="mainPanel">
      <!-- Welcome / No chat selected -->
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-icon">
          <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        </div>
        <h2>WA Clone</h2>
        <p>Pilih percakapan di sebelah kiri untuk mulai mengobrol.</p>
      </div>

      <!-- Active chat -->
      <div id="activeChatView" style="display:none;flex-direction:column;height:100%;">
        <div class="chat-header">
          <div class="chat-header-left">
            <button class="back-btn" id="backBtn">
              <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
            <div class="header-avatar" id="headerAvatar"></div>
            <div class="header-info">
              <div class="header-name" id="headerName">—</div>
              <div class="header-status" id="headerStatus">online</div>
            </div>
          </div>
          <div class="chat-header-right">
            <button class="icon-btn" title="Video call">
              <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
            </button>
            <button class="icon-btn" title="Telepon">
              <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
            </button>
            <button class="icon-btn" title="Cari">
              <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </button>
          </div>
        </div>

        <div class="chat-body" id="chatBody"></div>

        <div class="chat-input-area" style="position:relative;">
          <div class="emoji-picker" id="emojiPicker"></div>
          <div class="input-row">
            <div class="input-box">
              <button class="emoji-btn" id="emojiToggle" title="Emoji">😀</button>
              <input class="msg-input" id="msgInput" type="text" placeholder="Tulis pesan..." autocomplete="off" />
              <button class="attach-btn" title="Lampiran">
                <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
              </button>
            </div>
            <button class="send-btn" id="sendBtn" title="Kirim">
              <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ──────────────────────────────────────────────
    //  DATA
    // ──────────────────────────────────────────────
    const contacts = [
      {
        id: 1,
        name: 'Si "Dia',
        img: 'img/crush.jpeg',
        time: '14:30',
        preview: '✔ Imut yah 🤏🤏',
        online: false,
        messages: [
          { text: 'hallo kmu dmn?', from: 'sent', time: '14:25' },
          { text: 'udh mkn blm?', from: 'sent', time: '14:26' },
          { text: '✔ Imut yah 🤏🤏', from: 'recv', time: '20:30' },
          { text: 'bolela hebat kw cktu', from: 'sent', time: '20:30' },
        ]
      },
      {
        id: 3,
        name: 'Wibu handal',
        img: 'img/wibu.jpg',
        time: '10:20',
        preview: 'Siap om laksanakan',
        online: true,
        messages: [
          { text: 'udh gede nonton anime', from: 'sent', time: '10:15' },
          { text: 'berisik bakaa', from: 'recv', time: '10:20' },
        ]
      },
      {
        id: 4,
        name: 'Top Math',
        img: 'img/matht.jpg',
        time: '09:30',
        preview: ' Thanks bro',
        online: false,
        messages: [
          { text: 'bro persamaan cauchy ckmn si? 😀😀', from: 'sent', time: 'Kemarin' },
          { text: '✔tinggal am - qm b', from: 'recv', time: '09:25' },
          { text: 'Thanks bro', from: 'sent', time: '09:25' },

        ]
      },
      {
        id: 5,
        name: 'Masa Lalu',
        img: 'img/screenshot-20231016-182720-652d2ed9792a477bad29ba32.jpg',
        time: '30 Apr 2024',
        preview: 'jgn sok asik',
        online: false,
        messages: [
          { text: 'Hey, kita bisa ketemu gk?', from: 'recv', time: '30 Apr' },
          { text: 'jgn sok asik', from: 'recv', time: '30 Apr' },
        ]
      },
      {
        id: 6,
        name: 'Mantan Temen',
        img: 'img/0dff9cbaff06362efcb72a787af5eb99.jpg',
        time: '29 Apr 2024',
        preview: 'sedang mengetik...',
        online: true,
        messages: [
          { text: 'Eh kapan kita hangout lagi?', from: 'recv', time: '29 Apr' },
          { text: 'sedang mengetik...', from: 'typing', time: '' },
        ]
      },
    ];

    const EMOJIS = ['😀','😂','🥰','😎','🤔','😭','😅','🙏','👍','❤️','🔥','✅','😍','🤣','😊','🎉','💯','👏','😤','🤦','💪','😴','🤑','😏','👀','🫡','🥲','😬','🤩','😌'];

    // ──────────────────────────────────────────────
    //  STATE
    // ──────────────────────────────────────────────
    let activeId = null;
    let isDark = true;
    let isMobile = window.innerWidth <= 768;

    //  INIT
    function init() {
      renderChatList(contacts);
      buildEmojiPicker();
      bindEvents();
    }

    // ──────────────────────────────────────────────
    //  RENDER CHAT LIST
    // ──────────────────────────────────────────────
    function renderChatList(list) {
      const el = document.getElementById('chatList');
      el.innerHTML = '';
      list.forEach(c => {
        const item = document.createElement('div');
        item.className = 'chat-item' + (c.id === activeId ? ' active' : '');
        item.dataset.id = c.id;
        item.innerHTML = `
          <div class="chat-avatar">
            <img src="${c.img}" alt="${c.name}"
              onerror="this.parentElement.innerHTML='<span class=chat-avatar-placeholder>${c.name[0]}</span>'" />
          </div>
          <div class="chat-info">
            <div class="chat-info-top">
              <span class="chat-name">${c.name}</span>
              <span class="chat-time">${c.time}</span>
            </div>
            <div class="chat-preview">${getLastPreview(c)}</div>
          </div>
          ${c.unread ? `<div class="unread-badge">${c.unread}</div>` : ''}
        `;
        item.addEventListener('click', () => openChat(c.id));
        el.appendChild(item);
      });
    }

    function getLastPreview(c) {
      const msgs = c.messages.filter(m => m.from !== 'typing');
      if (!msgs.length) return c.preview;
      const last = msgs[msgs.length - 1];
      return (last.from === 'sent' ? '✔ ' : '') + last.text;
    }

    // ──────────────────────────────────────────────
    //  OPEN CHAT
    // ──────────────────────────────────────────────
    function openChat(id) {
      activeId = id;
      const contact = contacts.find(c => c.id === id);
      if (!contact) return;

      // Header
      document.getElementById('headerName').textContent = contact.name;
      const status = document.getElementById('headerStatus');
      if (contact.online) {
        status.textContent = 'online';
        status.className = 'header-status';
      } else {
        status.textContent = 'terakhir dilihat baru-baru ini';
        status.className = 'header-status offline';
      }

      // Header avatar
      const ha = document.getElementById('headerAvatar');
      ha.innerHTML = `<img src="${contact.img}" alt="${contact.name}"
        onerror="this.parentElement.innerHTML='<span class=header-avatar-placeholder>${contact.name[0]}</span>'" />`;

      // Show active chat view
      document.getElementById('welcomeScreen').style.display = 'none';
      const acv = document.getElementById('activeChatView');
      acv.style.display = 'flex';

      // Render messages
      renderMessages(contact);

      // Active state in list
      document.querySelectorAll('.chat-item').forEach(el => {
        el.classList.toggle('active', parseInt(el.dataset.id) === id);
      });

      // Mobile: hide sidebar
      if (isMobile) {
        document.getElementById('sidebar').classList.add('hidden');
      }

      // Focus input
      setTimeout(() => document.getElementById('msgInput').focus(), 100);
    }

    // ──────────────────────────────────────────────
    //  RENDER MESSAGES
    // ──────────────────────────────────────────────
    function renderMessages(contact) {
      const body = document.getElementById('chatBody');
      body.innerHTML = '';

      // Date separator
      const sep = document.createElement('div');
      sep.className = 'date-separator';
      sep.innerHTML = '<span>Hari ini</span>';
      body.appendChild(sep);

      contact.messages.forEach(msg => {
        if (msg.from === 'typing') {
          appendTyping(body);
        } else {
          appendBubble(body, msg, contact);
        }
      });

      scrollToBottom();
    }

    function appendBubble(container, msg, contact) {
      const row = document.createElement('div');
      row.className = 'msg-row ' + msg.from;

      const now = msg.time || getNow();
      const isSent = msg.from === 'sent';

      if (!isSent) {
        row.innerHTML = `
          <div class="msg-mini-avatar">
            <img src="${contact ? contact.img : ''}" alt=""
              onerror="this.parentElement.innerHTML='${(contact ? contact.name[0] : '?')}'" />
          </div>
          <div class="bubble">
            <div class="bubble-text">${escHtml(msg.text)}</div>
            <div class="bubble-meta"><span class="bubble-time">${now}</span></div>
          </div>`;
      } else {
        row.innerHTML = `
          <div class="bubble">
            <div class="bubble-text">${escHtml(msg.text)}</div>
            <div class="bubble-meta">
              <span class="bubble-time">${now}</span>
              <svg class="tick-icon" viewBox="0 0 24 24"><path d="M18 7l-1.41-1.41-6.34 6.34-2.83-2.83L6 10.5l4.25 4.25L18 7zm-7.42 9.92L4.5 10.83l1.41-1.41 4.67 4.67 10.43-10.43 1.41 1.41L10.58 16.92z"/></svg>
            </div>
          </div>`;
      }

      container.appendChild(row);
    }

    function appendTyping(container) {
      const row = document.createElement('div');
      row.className = 'msg-row recv typing-indicator';
      row.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
      container.appendChild(row);
    }

    // ──────────────────────────────────────────────
    //  SEND MESSAGE
    // ──────────────────────────────────────────────
    function sendMessage() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text || !activeId) return;

      const contact = contacts.find(c => c.id === activeId);
      if (!contact) return;

      // Remove typing indicator from data
      contact.messages = contact.messages.filter(m => m.from !== 'typing');

      const msg = { text, from: 'sent', time: getNow() };
      contact.messages.push(msg);

      // Append bubble to DOM
      const body = document.getElementById('chatBody');
      appendBubble(body, msg, contact);
      scrollToBottom();

      // Update preview in list
      updateChatPreview(contact);

      input.value = '';
      input.focus();

      // Simulate reply
      simulateReply(contact);
    }

    function simulateReply(contact) {
      const replies = [
        'Oke siap 👍',
        'Baik, nanti saya cek dulu ya',
        'Wkwkwk iya bener',
        'Siap bos!',
        'Ok ok ok 😁',
        'Bentar bro',
        'Mantap jiwa!',
        'Nanti deh, lagi makan dulu',
        '🙏🙏🙏',
        'Sabar bro sibuk',
        "Bolela hebat kw"
      ];

      // Show typing
      const body = document.getElementById('chatBody');
      const typingRow = document.createElement('div');
      typingRow.className = 'msg-row recv typing-indicator';
      typingRow.id = 'typingRow';
      typingRow.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
      body.appendChild(typingRow);
      scrollToBottom();

      setTimeout(() => {
        const el = document.getElementById('typingRow');
        if (el) el.remove();

        const replyText = replies[Math.floor(Math.random() * replies.length)];
        const replyMsg = { text: replyText, from: 'recv', time: getNow() };
        contact.messages.push(replyMsg);

        appendBubble(body, replyMsg, contact);
        scrollToBottom();
        updateChatPreview(contact);
      }, 1200 + Math.random() * 1200);
    }

    function updateChatPreview(contact) {
      const item = document.querySelector(`.chat-item[data-id="${contact.id}"]`);
      if (!item) return;
      const preview = item.querySelector('.chat-preview');
      if (preview) preview.textContent = getLastPreview(contact);
      const timeEl = item.querySelector('.chat-time');
      if (timeEl) timeEl.textContent = getNow();
    }

    //  SEARCH
    function filterChats(query) {
      const q = query.toLowerCase();
      const filtered = q
        ? contacts.filter(c => c.name.toLowerCase().includes(q) || c.preview.toLowerCase().includes(q))
        : contacts;
      renderChatList(filtered);
    }

    function buildEmojiPicker() {
      const picker = document.getElementById('emojiPicker');
      EMOJIS.forEach(e => {
        const sp = document.createElement('span');
        sp.textContent = e;
        sp.addEventListener('click', () => {
          const inp = document.getElementById('msgInput');
          inp.value += e;
          inp.focus();
        });
        picker.appendChild(sp);
      });
    }

    // ──────────────────────────────────────────────
    //  THEME TOGGLE
    // ──────────────────────────────────────────────
    function toggleTheme() {
      isDark = !isDark;
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      const icon = document.getElementById('themeIcon');
      if (isDark) {
        icon.innerHTML = `<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>`;
      } else {
        icon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
      }
      showToast(isDark ? '🌙 Dark mode aktif' : '☀️ Light mode aktif');
    }

    //  HELPERS
    function scrollToBottom() {
      const body = document.getElementById('chatBody');
      if (body) body.scrollTop = body.scrollHeight;
    }

    function getNow() {
      const d = new Date();
      return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    //  BIND EVENTS
    function bindEvents() {
      document.getElementById('sendBtn').addEventListener('click', sendMessage);

      document.getElementById('msgInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      });

      document.getElementById('searchInput').addEventListener('input', e => filterChats(e.target.value));

      document.getElementById('themeToggle').addEventListener('click', toggleTheme);

      document.getElementById('backBtn').addEventListener('click', () => {
        document.getElementById('sidebar').classList.remove('hidden');
        document.getElementById('activeChatView').style.display = 'none';
        document.getElementById('welcomeScreen').style.display = '';
        activeId = null;
      });

      document.getElementById('emojiToggle').addEventListener('click', e => {
        e.stopPropagation();
        document.getElementById('emojiPicker').classList.toggle('open');
      });

      document.addEventListener('click', e => {
        const picker = document.getElementById('emojiPicker');
        if (!picker.contains(e.target) && e.target.id !== 'emojiToggle') {
          picker.classList.remove('open');
        }
      });

      window.addEventListener('resize', () => {
        isMobile = window.innerWidth <= 768;
        if (!isMobile) {
          document.getElementById('sidebar').classList.remove('hidden');
        }
      });
    }

    init();
  </script>
</body>
</html>
